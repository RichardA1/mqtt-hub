# dnsmasq.conf — DHCP server + captive-portal DNS hijack for MQTT Hub
#
# All DNS queries on wlan0 resolve to the Pi itself (192.168.4.1), which
# forces every OS "is there internet?" check to hit our Nginx captive
# portal responder.

interface=wlan0
bind-interfaces

# --- DHCP ---
dhcp-range=192.168.4.2,192.168.4.20,255.255.255.0,24h
dhcp-option=3,192.168.4.1   # default gateway
dhcp-option=6,192.168.4.1   # DNS server

# --- DNS hijack (captive portal) ---
# Resolve every hostname to the Pi. This is what makes phones/laptops
# pop the "sign in to network" prompt.
address=/#/192.168.4.1

# Don't read /etc/resolv.conf or forward upstream — we have no internet
# uplink on this interface anyway.
no-resolv
no-poll

# Logging (disable in production if the SD card is a concern)
log-queries
log-dhcp

# Only listen on wlan0, never touch eth0/other interfaces
except-interface=lo
