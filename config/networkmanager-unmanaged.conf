# networkmanager-unmanaged.conf — tells NetworkManager to leave wlan0 alone
#
# On modern Raspberry Pi OS (Bookworm/Trixie and later), NetworkManager
# owns all network interfaces by default, including wlan0. That conflicts
# with hostapd/dnsmasq, which need to fully control wlan0 themselves to run
# it as an access point. This file excludes wlan0 from NetworkManager's
# management so the two don't fight over the interface.
#
# Installed to /etc/NetworkManager/conf.d/unmanaged-wlan0.conf by
# scripts/start-ap.sh (or setup.sh) on systems where NetworkManager is
# detected instead of dhcpcd.

[keyfile]
unmanaged-devices=interface-name:wlan0
