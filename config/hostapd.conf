# hostapd.conf — MQTT Hub Access Point
# Interface: wlan0 on Raspberry Pi Zero W
#
# NOTE: `wpa_passphrase` below is a placeholder. Change it before deploying!
# You can generate a proper PSK hash with:
#   wpa_passphrase "MQTT Hub" "YourRealPassword" | grep -v '^#'

interface=wlan0
driver=nl80211

ssid=MQTT Hub
hw_mode=g
channel=6
country_code=US
ieee80211n=1
wmm_enabled=1

auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP
wpa_passphrase=ChangeMe_MqttHub!

# Broadcast SSID (set to 1 to hide network)
ignore_broadcast_ssid=0

# Max associated stations (keep small for a Pi Zero W)
max_num_sta=8
