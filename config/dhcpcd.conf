# dhcpcd.conf additions for MQTT Hub
#
# Append this block to /etc/dhcpcd.conf (setup.sh does this automatically).
# It takes wlan0 out of DHCP-client mode and gives it a static AP address,
# and tells dhcpcd to leave wlan0 alone entirely.

interface wlan0
    static ip_address=192.168.4.1/24
    nohook wpa_supplicant
