# mosquitto.conf — MQTT Hub broker
#
# Two listeners:
#   1883 — standard MQTT/TCP, for WLED devices and any MQTT client
#   9001 — MQTT over WebSocket, for the browser dashboard (Paho JS)
#
# Anonymous access is allowed because this broker only exists on an
# isolated, password-protected WiFi AP with no internet uplink. If you
# extend this project to bridge to the internet, lock this down.

per_listener_settings true

listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

# Persistence so retained messages / QoS survive a broker restart
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest syslog
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true

# Keep memory/SD-card usage sane on a Pi Zero W
max_queued_messages 1000
message_size_limit 8192
